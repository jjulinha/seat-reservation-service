# Nome da aplicacao
spring.application.name=seat-reservation-service

# Conexao com o MySQL (rodando no Docker, porta 3307)
spring.datasource.url=jdbc:mysql://localhost:3307/seat_reservation
spring.datasource.username=seat_user
spring.datasource.password=seat_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis - mapeia colunas snake_case para camelCase do Java
mybatis.configuration.map-underscore-to-camel-case=true

# Porta do servico
server.port=8081

# Actuator - expoe endpoints de saude e metricas (observabilidade)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Flyway - migrations versionadas
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# MyBatis - registra os TypeHandlers customizados (UUID <-> BINARY)
mybatis.type-handlers-package=com.unisul.seatreservation.config

# MyBatis - localizacao dos arquivos XML de mapper
mybatis.mapper-locations=classpath:mapper/*.xml